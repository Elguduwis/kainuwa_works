name: kainuwa_works
description: Kainuwa Works Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.1
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  change_app_package_name: ^1.1.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/img/

# FIXED: Using the modern key and turning iOS off since we only compile for Android
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/img/logo.png"
  remove_alpha_ios: true
