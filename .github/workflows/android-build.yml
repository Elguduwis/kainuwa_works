name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Generate Platform Folders
      run: flutter create --platforms=android .
        
    - name: Inject Internet Permissions
      run: sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Set Custom Package Name (com.kainuwa.africa)
      run: flutter pub run change_app_package_name:main com.kainuwa.africa
      
    - name: Generate Custom App Icon
      run: flutter pub run flutter_launcher_icons
      
    - name: Force Permanent Digital Signature
      run: |
        keytool -genkey -v -keystore android/app/kainuwa.jks -keyalg RSA -keysize 2048 -validity 10000 -alias kainuwa -storepass kainuwa123 -keypass kainuwa123 -dname "CN=Kainuwa Works, C=NG"
        echo "android.signingConfigs.debug.storeFile = file('kainuwa.jks')" >> android/app/build.gradle
        echo "android.signingConfigs.debug.storePassword = 'kainuwa123'" >> android/app/build.gradle
        echo "android.signingConfigs.debug.keyAlias = 'kainuwa'" >> android/app/build.gradle
        echo "android.signingConfigs.debug.keyPassword = 'kainuwa123'" >> android/app/build.gradle
      
    - name: Build Google Play App Bundle (.aab)
      run: flutter build appbundle --release
      
    - name: Build Optimized APK (.apk)
      run: flutter build apk --release
        
    - name: Secure & Rename APK
      run: |
        APK_PATH=$(find build -type f -name "*.apk" | grep -v "test" | head -n 1)
        mv "$APK_PATH" Optimized-Release.apk
        
    - name: Upload App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: PlayStore-Release-AAB
        path: build/app/outputs/bundle/release/app-release.aab
        
    - name: Upload Optimized APK
      uses: actions/upload-artifact@v4
      with:
        name: Direct-Install-APK
        path: Optimized-Release.apk
